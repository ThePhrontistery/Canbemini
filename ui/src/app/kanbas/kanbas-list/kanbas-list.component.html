  <!-- <button mat-raised-button color="accent" (click) = "newKanba()"><mat-icon>add</mat-icon></button> -->


    <div class="justify-content-center mt">

      <button mat-fab type="addButton"  (click) = "newKanban()" color="primary" aria-label="Example icon button with a delete icon">

        <mat-icon>add</mat-icon>
      </button>

      <div class="justify-content-center" *ngIf="listKanbas.length>0">      

        <mat-card class="kamba-card" *ngFor="let item of listKanbas; let i = index;">
            <mat-card-header (click)="openKanban(item)" >    
              <mat-card-title>{{item.title}}</mat-card-title>
              <!-- <mat-card-subtitle>Dog Breed</mat-card-subtitle> -->
            </mat-card-header>
           
            <mat-card-content (click)="openKanban(item)">
              <p>
               {{item.description}}
              </p>
              <div class="flex-start">
                <div class="user ml" *ngFor="let itemUserKanbanPermission of item.userKanbanPermission">
                      {{itemUserKanbanPermission.users.email |  slice:0:3 }}
                 </div>
              </div>
            </mat-card-content>
            <mat-card-actions class="example-button-row">
              <button mat-raised-button *ngIf="isOwner(i)" color="warn" (click)="removeKanban(item)"><mat-icon>delete</mat-icon></button>
              <button mat-raised-button *ngIf="isOwner(i)" color="primary" (click)="editKanban(item)"><mat-icon>edit</mat-icon></button>
              <button mat-raised-button matTooltip="Copy the link to share your companions"
                matTooltipClass="example-tooltip-uppercase" 
                aria-label="Button that shows a red tooltip"
                [matTooltipPosition]="'right'"
                (click)="shareKanban(item); openSnackBar('Share link copied succesfuly!', 'OK!');" color="accent"><mat-icon>share</mat-icon>
              </button>
            </mat-card-actions>
          </mat-card>

          
    </div>

    </div>
